# Docker Compose override for CI/CD testing
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up

services:
  backend:
    # Don't mount volumes in CI - use code from image
    volumes: []
    environment:
      - ENVIRONMENT=test
      - DEBUG=True
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/examai_test
    # Override command to not use --reload in CI
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  celery_worker:
    # Don't run celery worker in CI - not needed for tests
    scale: 0
    volumes: []
    environment:
      - ENVIRONMENT=test
      - DEBUG=True
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/examai_test

  db:
    environment:
      - POSTGRES_DB=examai_test
    # Don't use persistent volumes in CI - always start fresh
    volumes: []
