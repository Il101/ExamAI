# Docker Compose override for CI/CD testing
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up

services:
  backend:
    # Don't mount volumes in CI - use code from image
    volumes: []
    environment:
      - ENVIRONMENT=test
      - DEBUG=True
      # Use Supabase DATABASE_URL from GitHub Secrets
      - DATABASE_URL=${DATABASE_URL}
    # Override command to not use --reload in CI
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  celery_worker:
    # Don't run celery worker in CI - not needed for tests
    scale: 0
    volumes: []
    environment:
      - ENVIRONMENT=test
      - DEBUG=True
      - DATABASE_URL=${DATABASE_URL}

  celery_beat:
    # Don't run celery beat in CI - not needed for tests
    scale: 0
