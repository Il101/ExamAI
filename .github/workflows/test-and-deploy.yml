name: Test and Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write
  actions: read

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # Backend Tests
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    env:
      # Test environment variables
      ENVIRONMENT: test
      DEBUG: True
      POSTGRES_DB: examai_test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/examai_test
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: test_secret_key_min_32_chars_long
      GEMINI_API_KEY: dummy_key_for_testing
      GEMINI_MODEL: gemini-2.5-flash-lite
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and Start Services
        run: |
          # Start services using both base and test compose files
          # --wait will wait for health checks to pass
          docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build --wait
          
          echo "✅ All services are healthy and ready"
      
      - name: Verify services are running
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml ps
      
      - name: Run database migrations
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T backend alembic upgrade head
      
      - name: Clean up coverage files
        run: |
          # Remove any existing coverage files as root to avoid permission issues
          docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T --user root backend sh -c "rm -f /app/.coverage /app/.coverage.* && chown -R appuser:appuser /app" || true
      
      - name: Run tests with coverage
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T backend pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing --ignore=tests/e2e
      
      - name: Copy coverage report
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml cp backend:/app/coverage.xml ./coverage.xml
      
      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        continue-on-error: true
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          file: ./coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
  
  # Frontend Tests
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run linting
        run: |
          cd frontend
          npm run lint
      
      - name: Run type checking
        run: |
          cd frontend
          npm run type-check
      
      - name: Run tests
        run: |
          cd frontend
          npm run test:ci
      
      - name: Build
        run: |
          cd frontend
          npm run build
  
  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'backend'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
  
  # Deploy to Staging (develop branch)
  deploy-staging:
    name: Deploy to Staging
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Deploy Backend to Railway (Staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          npm install -g @railway/cli
          railway up --service backend
      
      - name: Deploy Frontend to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
      
      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # Add smoke test commands here
  
  # Deploy to Production (main branch)
  deploy-production:
    name: Deploy to Production
    needs: [backend-tests, frontend-tests, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Deploy Backend to Railway (Production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service backend
      
      - name: Run database migrations on Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Run migrations on Railway environment where DB is accessible
          railway run --service backend alembic upgrade head
      
      - name: Deploy Frontend to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend
      
      - name: Health check
        run: |
          echo "Checking backend health..."
          curl -f https://api.examai-pro.com/health || exit 1
          echo "✅ Backend is healthy"
      
      - name: Notify deployment
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            STATUS="${{ job.status }}"
            curl -X POST $SLACK_WEBHOOK_URL \
              -H 'Content-Type: application/json' \
              -d '{"text":"Production deployment completed with status: '"$STATUS"'"}';
          fi
